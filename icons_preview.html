<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redaction Icons Preview</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: #f9fafb;
    margin: 0;
  }
  .container {
    background: white;
    padding: 3rem;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    text-align: center;
  }
  h1 {
    font-size: 1.25rem;
    color: #374151;
    margin-bottom: 2rem;
  }
  .icon-group {
    display: flex;
    gap: 2rem;
    justify-content: center;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }
  .icon-box {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #ffffff;
    color: #111827; /* Main text color */
  }
  .label {
    font-size: 0.875rem;
    color: #6b7280;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Redaction Level Icons</h1>
  <div class="icon-group">
    
    <div class="icon-card">
      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Serif A -->
          <text x="20" y="34" font-family="ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif" font-size="38" font-weight="bold" text-anchor="middle" fill="currentColor">A</text>
          <!-- 1 Strike (Parallelogram) -->
          <polygon points="5,18 38,18 35,23 2,23" fill="#1e3a5f" />
        </svg>
      </div>
      <span class="label">Light</span>
    </div>

    <div class="icon-card">
      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Serif A -->
          <text x="20" y="34" font-family="ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif" font-size="38" font-weight="bold" text-anchor="middle" fill="currentColor">A</text>
          <!-- 2 Strikes (Parallelograms) -->
          <polygon points="5,10 38,10 35,15 2,15" fill="#1e3a5f" />
          <polygon points="5,26 38,26 35,31 2,31" fill="#1e3a5f" />
        </svg>
      </div>
      <span class="label">Balanced</span>
    </div>

    <div class="icon-card">
      <div class="icon-box">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Serif A -->
          <text x="20" y="34" font-family="ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif" font-size="38" font-weight="bold" text-anchor="middle" fill="currentColor">A</text>
          <!-- 3 Strikes (Parallelograms) -->
          <polygon points="5,10 38,10 35,15 2,15" fill="#1e3a5f" />
          <polygon points="5,18 38,18 35,23 2,23" fill="#1e3a5f" />
          <polygon points="5,26 38,26 35,31 2,31" fill="#1e3a5f" />
        </svg>
      </div>
      <span class="label">Strict</span>
    </div>

  </div>
</div>

</body>
</html>
